<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#151411">
    <meta name="description" content="Юлия Грекова — психолог и консультант">
    <title>Юлия Грекова</title>

    <link rel="stylesheet" href="style.css?v=40">
</head>

<body>
    <div class="marble" aria-hidden="true"></div>

    <div class="language-switch" role="group" aria-label="Язык">
        <button type="button" data-lang="ru" aria-pressed="true">RU</button>
        <span aria-hidden="true">/</span>
        <button type="button" data-lang="de" aria-pressed="false">DE</button>
    </div>

    <div class="intro" aria-hidden="true">
        <div class="feather-path">
            <img class="feather" src="перо.png?v=34" alt="">
        </div>

        <span class="touch"></span>
    </div>

    <main class="card">
        <header class="identity reveal">
            <img class="phoenix" src="phoenix.svg?v=30" alt="Золотой феникс" data-i18n-alt="phoenixAlt">

            <p class="eyebrow" data-i18n="eyebrow">Психолог · консультант</p>

            <h1 data-i18n="name">Юлия Грекова</h1>

            <p class="intro-text" data-i18n="intro">
                Пространство для бережного разговора, самопонимания и внутренней опоры.
            </p>
        </header>

        <nav class="links" aria-label="Контакты" data-i18n-aria="contacts">
            <a class="link-card reveal" href="https://www.instagram.com/grekova.yuli/" target="_blank" rel="noreferrer">
                <span>Instagram</span>
                <small data-i18n="view">Смотреть</small>
            </a>

            <a class="link-card reveal" href="https://wa.me/ТВОЙ_НОМЕР" target="_blank" rel="noreferrer">
                <span>WhatsApp</span>
                <small data-i18n="write">Написать</small>
            </a>

            <a class="link-card reveal" href="#" target="_blank" rel="noreferrer">
                <span data-i18n="booking">Записаться</span>
                <small data-i18n="consultation">Консультация</small>
            </a>

            <a class="link-card reveal" href="#approach">
                <span data-i18n="approach">Мой подход</span>
                <small data-i18n="more">Подробнее</small>
            </a>
        </nav>

        <section class="approach reveal" id="approach">
            <p data-i18n-html="quote">«Любопытство —<br>начало любого изменения.»</p>
        </section>
    </main>

    <button class="skip" type="button" data-i18n="skip">Пропустить</button>

    <script src="script.js?v=40"></script>
</body>
</html>
