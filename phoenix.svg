<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
 <defs>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8c6124"/><stop offset=".28" stop-color="#ffd97a"/><stop offset=".52" stop-color="#b57a22"/><stop offset=".76" stop-color="#ffe39a"/><stop offset="1" stop-color="#8f6124"/></linearGradient>
  <filter id="shine" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
 </defs>
 <style>
  .mark{fill:none;stroke:url(#gold);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round;filter:url(#shine);stroke-dasharray:700;stroke-dashoffset:700;animation:draw 2.15s 4.15s ease forwards}
  .inner{stroke-width:1.15;opacity:.72}
  .star{fill:#ffe9a9;stroke:none;filter:url(#shine);opacity:0;animation:appear .8s 5.2s ease forwards}
  @keyframes draw{to{stroke-dashoffset:0}}@keyframes appear{to{opacity:1}}
  @media(prefers-reduced-motion:reduce){.mark{stroke-dashoffset:0;animation:none}.star{opacity:1;animation:none}}
 </style>
